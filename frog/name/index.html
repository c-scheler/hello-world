<!DOCTYPE html>
<html>
  <head>
    <title>Frog Name</title>
  </head>
  <body>
    <h1>This frog's name is:</h1>
    <p id="frogname"></p>
    <img src="https://raw.githubusercontent.com/c-scheler/hello-world/refs/heads/main/img/frog.png" alt="drawing of a frog"/>

    <script>
      const names = ["Alfredo", "Alberto", "Al Capone"];
      window.onload = () => {
          frogname.innerHTML = names[Math.floor(Math.random()*names.length)];
      }
    </script>
  </body>
</html>
